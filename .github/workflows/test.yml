name: Test
on:
  # Can be called from other workflows
  workflow_call:
    secrets:
      PERSONAL_ACCESS_TOKEN:
        required: true

  # Can be run manually
  workflow_dispatch:

  # on git push
  push:
    branches:
      - dev
    paths:
      - '**/*.{ts,js,mjs,cjs}'
      - '**/package.json'
      - '**/tsconfig*.json'

# Only one run per branch at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  KAFKA_BROKERS: localhost:9092
#  SKIP_KAFKA_TESTS: "true"
#  SKIP_SQB_TESTS: "true"
#  SKIP_RABBITMQ_TESTS: "true"
#  SKIP_ELASTIC_TESTS: "true"

jobs:
  test:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        !(
          contains(github.event.head_commit.message, 'no-test') ||
          ( 
            startsWith(github.event.head_commit.message, 'Merge pull request') &&
            contains(github.event.head_commit.message, '/dev')
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      kafka:
        image: confluentinc/confluent-local:latest
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      postgres:
        image: 'postgres'
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: 'rabbitmq'
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Wait Kafka
        run: |
          for i in {1..60}; do
            nc -z localhost 9092 && exit 0
            sleep 1
          done
          exit 1

      - name: 'Setup Environment'
        uses: panates/ghac-setup-node@v1
        with:
          node-version: '24'
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Configure sysctl limits
        run: |
          sudo swapoff -a
          sudo sysctl -w vm.swappiness=1
          sudo sysctl -w fs.file-max=262144
          sudo sysctl -w vm.max_map_count=262144

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: 8.0
          mongodb-replica-set: test-rs

      - name: Runs Elasticsearch
        uses: elastic/elastic-github-actions/elasticsearch@master
        with:
          stack-version: 9.0.0
          security-enabled: false

      #      - name: Run Kafka KRaft Broker
      #        uses: spicyparrot/kafka-kraft-action@v1.1.3
      #        with:
      #          kafka-version: "3.7.0"
      #          kafka-topics: "feed-cat,1,feed-dog,1,email-channel-1,1,email-channel-2,1,sms-channel-1,1,sms-channel-2,1"

      - name: Run qc tests
        run: rman run qc

      - name: Run unit tests
        run: npm run citest
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          KAFKA_BROKER: localhost:9092
          ELASTIC_HOST: http://localhost:9200

      - name: Send coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
